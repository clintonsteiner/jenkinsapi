name: Build and Publish Jenkins Docker Image

on:
  schedule:
    # Run weekly on Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:  # Allow manual trigger
  push:
    branches:
      - master
    paths:
      - 'ci/Dockerfile'
      - 'ci/plugins.txt'
      - '.github/workflows/build-jenkins-image.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de9bd072b392f5 # v3.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1913650ce22d # v3.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@8e5442c4ef9f78752691e2d8f8acb49678925e93 # v5.0.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/jenkinsapi-jenkins
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=weekly,enable={{is_default_branch}}
            type=schedule,pattern=weekly-{{date 'YYYY-MM-DD'}}
            type=schedule,pattern={{date 'YYYY-MM-DD'}}
            type=ref,event=branch
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@5176665424ac18358a3a037f0598e02d11567dcba # v5.0.0
        with:
          context: ./ci
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Image digest:" || true
